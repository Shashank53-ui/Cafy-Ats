name: "Scheduled Sync Part 3A (Mid-Tiers 1)"

on:
  workflow_run:
    workflows: ["Scheduled Sync Part 2 (The Big Three)"]
    types:
      - completed
  workflow_dispatch:

jobs:
  sync_part_3a:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Job Sync (Mid-Tiers First Half)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          SEARXNG_INSTANCES: ${{ secrets.SEARXNG_INSTANCES }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: npm run sync -- --ats ashby,ashbyhq,workday,jazzhr,personio,smartrecruiters --limit 8000

      - name: Commit CSV results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/excel/companies_with_*.csv || true
          git commit -m "chore: Update scraped company CSV files (Part 3A) [skip ci]" || true
          git pull --rebase origin main || true
          git push origin main || true

      - name: Upload CSV Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraped-csvs-part-3a
          path: data/excel/companies_with_*.csv
          retention-days: 7
