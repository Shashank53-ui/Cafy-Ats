name: UK Filter Validation

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-uk-filter:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests openpyxl
          
      - name: Run verification script
        run: python verify_uk_companies.py
        
      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/excel/UK_companies_only.xlsx data/excel/Non_UK_companies.xlsx
          # Only commit if there are changes
          git diff --staged --quiet || (git commit -m "Automated update of UK companies filter" && git push)
