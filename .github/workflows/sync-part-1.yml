name: "Scheduled Sync Part 1 (Join.com)"

on:
  # schedule:
  #   - cron: '15 12 * * *'
  workflow_dispatch:

jobs:
  sync_part_1:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Job Sync (Join.com)
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          REED_API_KEY: ${{ secrets.REED_API_KEY }}
          SEARXNG_INSTANCES: ${{ secrets.SEARXNG_INSTANCES }}
          TURNSTILE_SECRET_KEY: ${{ secrets.TURNSTILE_SECRET_KEY }}
        run: npm run sync -- --clear-csvs --ats join_com

      - name: Commit CSV results
        if: always()
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/excel/companies_with_*.csv || true
          git commit -m "chore: Update scraped company CSV files (Part 1) [skip ci]" || true
          git push || true
